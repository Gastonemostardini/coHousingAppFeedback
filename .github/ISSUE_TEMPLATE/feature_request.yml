name: "✨ Feature Request"
description: Propose a new feature or improvement for the app
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea to improve the app? Tell us about it!

  - type: textarea
    id: description
    attributes:
      label: Feature description
      description: What would you like the app to do?
      placeholder: Describe the feature you're proposing
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Problem it solves / motivation
      description: Why would this feature be useful? What problem does it solve?
      placeholder: e.g. "Currently it's hard to do X because..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Do you already have an idea of how it could work?
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Are there other ways to solve the same problem that you've considered?
    validations:
      required: false
