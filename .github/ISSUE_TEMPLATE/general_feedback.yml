name: "💬 General Feedback"
description: Share impressions, usability issues, or observations not related to a specific bug
title: "[Feedback]: "
labels: ["feedback"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for your feedback! Help us understand your experience with the app.

  - type: dropdown
    id: type
    attributes:
      label: Feedback type
      options:
        - UX / Usability
        - Content / copy
        - Performance
        - Visual design
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Tell us about your experience or observation
      placeholder: What did you notice? What worked well or poorly?
    validations:
      required: true

  - type: input
    id: area
    attributes:
      label: Affected area of the app
      description: Which screen or feature does this feedback relate to?
      placeholder: e.g. Onboarding, Profile, Housing search...
    validations:
      required: false

  - type: textarea
    id: suggestions
    attributes:
      label: Suggestions
      description: Any ideas on how to improve?
    validations:
      required: false
