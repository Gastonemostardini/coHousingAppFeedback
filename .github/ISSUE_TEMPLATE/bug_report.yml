name: "🐛 Bug Report"
description: Report a malfunction or error encountered while testing the app
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping test the app! Please fill in the fields below with as much detail as possible to help us reproduce and fix the issue.

  - type: textarea
    id: description
    attributes:
      label: Problem description
      description: What isn't working as expected?
      placeholder: Describe the bug clearly and concisely
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the issue?
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Scroll down to '...'
        4. The error appears
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: false

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead?
    validations:
      required: false

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - iOS
        - Android
        - Web (Desktop)
        - Web (Mobile)
        - Other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: App version (if known)
      placeholder: e.g. 1.2.3
    validations:
      required: false

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - Low (minor annoyance)
        - Medium (affects usage but a workaround exists)
        - High (important feature unusable)
        - Blocking (app is unusable / crashes)
    validations:
      required: true

  - type: textarea
    id: attachments
    attributes:
      label: Screenshots or attachments
      description: Drag and drop screenshots, videos, or useful logs here (optional)
    validations:
      required: false
